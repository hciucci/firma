<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vehicles | FIRMA</title>
  <link rel="stylesheet" href="firma.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body class="vehicles">
  <header class="topbar">
    <div class="brand">
      <a class="logoLink" href="index.html" aria-label="FIRMA home">
        <img class="navLogo" src="images/firma-logo.png" alt="FIRMA logo" />
      </a>

      <button
        class="menu-toggle"
        id="menuBtn"
        type="button"
        aria-label="Open menu"
        aria-controls="mainNav"
        aria-expanded="false"
      >
        <span></span><span></span><span></span>
      </button>

      <nav class="nav" id="mainNav">
        <a href="about.html">About us</a>
        <a href="locate-dealer.html">Locate Dealer</a>
        <a class="active" href="vehicles.html">Vehicles</a>
        <a href="account.html">Account</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <h2 class="section-title">SPORT PERFORMANCE</h2>
    <div class="vehicle-grid">
      <div class="card">
        <img src="images/vortice.png" alt="FIRMA Vortice R">
        <h3>FIRMA VORTICE R</h3>
      </div>

      <div class="card">
        <img src="images/f22.png" alt="FIRMA F22">
        <h3>FIRMA F22</h3>
      </div>
    </div>

    <h2 class="section-title">SPORT UTILITY</h2>
    <div class="vehicle-grid">
      <div class="card">
        <img src="images/x8.png" alt="FIRMA X8">
        <h3>FIRMA X8</h3>
      </div>

      <div class="card">
        <img src="images/x6.png" alt="FIRMA X6">
        <h3>FIRMA X6</h3>
      </div>

      <div class="card">
        <img src="images/x4.png" alt="FIRMA X4">
        <h3>FIRMA X4</h3>
      </div>
    </div>
  </main>

  <footer class="jaxonFooter">
    <div class="footer-logo">
      <img src="images/footer-logo.png" alt="Firma Wordmark">
    </div>

    <div class="footer-links">
      <a href="index.html">About us</a>
      <a href="vehicles.html">Vehicles</a>
      <a href="account.html">Account</a>
      <a href="locate-dealer.html">Locate Dealer</a>
    </div>

    <p class="copyright">2026 Firma all rights reserved</p>
  </footer>

  <script>
    const btn = document.getElementById('menuBtn');
    const nav = document.getElementById('mainNav');

    if (btn && nav) {
      const closeNav = () => {
        nav.classList.remove('open');
        btn.classList.remove('active');
        btn.setAttribute('aria-expanded', 'false');
      };

      btn.addEventListener('click', () => {
        const isOpen = nav.classList.toggle('open');
        btn.classList.toggle('active', isOpen);
        btn.setAttribute('aria-expanded', String(isOpen));
      });

      nav.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', closeNav);
      });
    }
  </script>
</body>
</html>
