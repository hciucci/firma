<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Account | FIRMA</title>
  <link rel="stylesheet" href="firma.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body class="account">
  <header class="topbar">
    <div class="brand">
      <a class="logoLink" href="index.html" aria-label="FIRMA home">
        <img class="navLogo" src="images/firma-logo.png" alt="FIRMA logo" />
      </a>

      <button
        class="menu-toggle"
        id="menuBtn"
        type="button"
        aria-label="Open menu"
        aria-controls="mainNav"
        aria-expanded="false"
      >
        <span></span><span></span><span></span>
      </button>

      <nav class="nav" id="mainNav">
        <a href="about.html">About us</a>
        <a href="locate-dealer.html">Locate Dealer</a>
        <a href="vehicles.html">Vehicles</a>
        <a class="active" href="account.html">Account</a>
      </nav>
    </div>
  </header>

  <main class="account-page-container">
    <section class="account-box" aria-label="Account portal">
      <h2 style="font-weight: 300; letter-spacing: 0.22em;">ACCOUNT PORTAL</h2>
      <p>Hello, Edward</p>
      <p style="color: #888; font-size: 12px; margin-bottom: 30px;">edward@email.firma.com</p>

      <form style="display: flex; flex-direction: column; gap: 10px;">
        <input type="password" placeholder="Current password" aria-label="Current password">
        <input type="password" placeholder="New password" aria-label="New password">
        <input type="password" placeholder="Confirm new password" aria-label="Confirm new password">
        <button type="button">DELETE ACCOUNT</button>
      </form>
    </section>
  </main>

  <footer class="jaxonFooter">
    <div class="footer-logo">
      <img src="images/footer-logo.png" alt="Firma Wordmark">
    </div>

    <div class="footer-links">
      <a href="index.html">About us</a>
      <a href="vehicles.html">Vehicles</a>
      <a href="account.html">Account</a>
      <a href="locate-dealer.html">Locate Dealer</a>
    </div>

    <p class="copyright">2026 Firma all rights reserved</p>
  </footer>

  <script>
    const btn = document.getElementById('menuBtn');
    const nav = document.getElementById('mainNav');

    if (btn && nav) {
      const closeNav = () => {
        nav.classList.remove('open');
        btn.classList.remove('active');
        btn.setAttribute('aria-expanded', 'false');
      };

      btn.addEventListener('click', () => {
        const isOpen = nav.classList.toggle('open');
        btn.classList.toggle('active', isOpen);
        btn.setAttribute('aria-expanded', String(isOpen));
      });

      nav.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', closeNav);
      });
    }
  </script>
</body>
</html>
